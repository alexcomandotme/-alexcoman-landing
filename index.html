<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alexcoman.me</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'JetBrains Mono', monospace;
    padding: 2rem;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .term-header {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .term-output {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    line-height: 2;
    min-height: 80px;
    font-weight: 500;
  }

  .term-output .line { display: block; }
  .term-output .dim { color: rgba(255,255,255,0.3); }
  .term-output .bright { color: #fff; }
  .term-output .ok { color: #1D9E75; }
  .term-output .err { color: #E24B4A; }
  .term-output .ai { color: #5DCAA5; }

  .term-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 1.5rem;
    border-top: 0.5px solid rgba(255,255,255,0.12);
    padding-top: 1.5rem;
  }

  .term-prompt {
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    white-space: nowrap;
  }

  #term-input {
    background: transparent;
    border: none;
    outline: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #fff;
    flex: 1;
    caret-color: #fff;
  }

  #term-input::placeholder { color: rgba(255,255,255,0.2); }

  .hint {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    margin-top: 1rem;
    letter-spacing: 0.04em;
    min-height: 16px;
  }
</style>
</head>
<body>

<div class="term-header">alexcoman.me</div>

<div class="term-output" id="output">
  <span class="line dim">last login: today</span>
  <span class="line">&nbsp;</span>
  <span class="line">you're at the surface.</span>
  <span class="line dim">there's more underneath.</span>
  <span class="line">&nbsp;</span>
</div>

<div class="term-input-row">
  <span class="term-prompt">alex@coman ~ %</span>
  <input id="term-input" autocomplete="off" autocorrect="off" spellcheck="false" autofocus placeholder="type a command..." />
</div>

<div class="hint" id="hint">try: help</div>

<script>
const input = document.getElementById('term-input');
const output = document.getElementById('output');
const hint = document.getElementById('hint');

const responses = {
  help: [
    { text: 'available commands:', cls: 'dim' },
    { text: '  funfacts ', cls: '' },
    { text: '  whoami ', cls: '' },
    { text: '  uptime ', cls: '' },
  ],
  'cat readme.txt': [
    { text: 'this is the surface.', cls: '' },
    { text: 'the work lives somewhere else.', cls: '' },
    { text: 'https://linkedin.com/in/alexcoman', cls: 'ok' },
  ],
};

const funfactsList = [
  'LLMs don\'t actually think. they autocomplete at scale.',
  'the AI answering you has no idea what day it is.',
  'it also has no idea it\'s on a portfolio site.',
  'it was trained on the internet. make of that what you will.',
  'every response is a statistical guess. a very confident one.',
  'the model has read more books than any human. understood fewer.',
  'hallucination is just autocomplete with confidence.',
  'there is no "it". there is only the next token.',
  'it doesn\'t remember you. it never did.',
  'context window: the only form of memory it has.',
];

const redirectCommands = ['open desktop', 'cd desktop', 'cd /desktop', 'desktop'];

function getUptime() {
  const born = new Date('1990-08-19T09:30:00Z');
  const now = new Date();
  const diff = now - born;
  const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
  const days = Math.floor((diff % (1000 * 60 * 60 * 24 * 365.25)) / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const secs = Math.floor((diff % (1000 * 60)) / 1000);
  return years + 'y ' + days + 'd ' + hours + 'h ' + mins + 'm ' + secs + 's';
}

function addLine(text, cls) {
  const span = document.createElement('span');
  span.className = 'line ' + (cls || '');
  span.textContent = text;
  output.appendChild(span);
  output.scrollTop = output.scrollHeight;
}

function addLines(lines) {
  lines.forEach(function(l) { addLine(l.text, l.cls || ''); });
  addLine('');
}

async function askAI(query) {
  addLine('> thinking...', 'dim');

  try {
    const response = await fetch('https://alexcoman-landing.vercel.app/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: query })
    });

    const data = await response.json();
    const text = data.text;

    if (text) {
      text.split('\n').filter(function(l) { return l.trim(); }).forEach(function(l) {
        if (l.match(/^https?:\/\//)) {
          const a = document.createElement('a');
          a.href = l.trim();
          a.textContent = '> ' + l.trim();
          a.style.color = '#5DCAA5';
          a.style.display = 'block';
          a.target = '_top';
          output.appendChild(a);
        } else {
          addLine('> ' + l, 'ai');
        }
      });
    } else {
      addLine('> no response.', 'err');
    }
  } catch (e) {
    addLine('> connection failed.', 'err');
  }

  addLine('');
}

input.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const val = input.value.trim();
  const valLower = val.toLowerCase();
  if (!val) return;

  addLine('alex@coman ~ % ' + val, 'dim');
  input.value = '';
  hint.textContent = '';

  if (redirectCommands.indexOf(valLower) !== -1) {
    addLines([
      { text: 'unlocking /desktop...', cls: 'dim' },
      { text: 'redirecting.', cls: 'ok' },
    ]);
    setTimeout(function() {
      window.top.location.href = 'https://alexcoman.me/desktop';
    }, 800);
    return;
  }

  if (valLower === 'whoami') {
    addLine('redirecting to /desktop...', 'dim');
    setTimeout(function() {
      window.top.location.href = 'https://alexcoman.me/desktop';
    }, 600);
    return;
  }

  if (valLower === 'uptime') {
    const span = document.createElement('span');
    span.className = 'line bright';
    span.textContent = getUptime();
    output.appendChild(span);
    addLine('load average: variable', 'dim');
    addLine('');
    const interval = setInterval(function() {
      span.textContent = getUptime();
    }, 1000);
    setTimeout(function() { clearInterval(interval); }, 60000);
    return;
  }

  if (valLower === 'funfacts') {
    const shuffled = funfactsList.slice().sort(function() { return 0.5 - Math.random(); });
    addLine(shuffled[0], '');
    addLine('');
    return;
  }

  const resp = responses[valLower];
  if (resp) {
    addLines(resp);
  } else {
    askAI(val);
  }
});

input.addEventListener('input', function() {
  const v = input.value.toLowerCase();
  if (v.indexOf('open') === 0 || v.indexOf('cd') === 0 || v === 'desktop') {
    hint.textContent = '→ this will take you somewhere';
  } else {
    hint.textContent = '';
  }
});
</script>
</body>
</html>
