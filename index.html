<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alexcoman.me</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: transparent;
    font-family: 'JetBrains Mono', monospace;
    padding: 2rem 4rem;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: opacity 0.4s ease;
  }

  body.fade-out { opacity: 0; }

  .term-header {
    font-size: 15px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 2rem;
    font-weight: 700;
  }

  .term-output {
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    line-height: 2;
    font-weight: 700;
    position: relative;
    overflow-y: auto;
    max-height: 60vh;
  }

  .term-output .line { display: block; white-space: pre-wrap; word-break: break-word; }
  .term-output .dim { color: rgba(255,255,255,0.3); }
  .term-output .bright { color: #fff; }
  .term-output .ok { color: #1D9E75; }
  .term-output .err { color: #E24B4A; }
  .term-output .ai { color: #5DCAA5; }
  .term-output .help-header { color: #E89846; }
  .term-output .help-cmd { color: #E89846; }

  .term-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 1.5rem;
    border-top: 0.5px solid rgba(255,255,255,0.12);
    padding-top: 1.5rem;
  }

  .term-prompt {
    font-size: 15px;
    color: rgba(255,255,255,0.3);
    white-space: nowrap;
    font-weight: 700;
  }

  #term-input {
    background: transparent;
    border: none;
    outline: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    flex: 1;
    caret-color: #fff;
  }

  #term-input::placeholder {
    color: rgba(255,255,255,0.2);
    font-weight: 700;
  }

  .hint {
    font-size: 11px;
    color: #E89846;
    margin-top: 1rem;
    letter-spacing: 0.04em;
    min-height: 16px;
    font-weight: 700;
  }

  @media (max-width: 640px) {
    body { padding: 1.5rem 1.25rem; }
    .term-output { font-size: 14px; max-height: 55vh; }
    .term-prompt { font-size: 14px; }
    #term-input { font-size: 16px; } /* prevents iOS zoom */
  }
</style>
</head>
<body>

<div class="term-header">alexcoman.me</div>

<div class="term-output" id="output">
  <span class="line">you're at the surface.</span>
  <span class="line dim">there's more underneath.</span>
  <span class="line">&nbsp;</span>
</div>

<div class="term-input-row">
  <span class="term-prompt">alex@coman ~ %</span>
  <input id="term-input" autocomplete="off" autocorrect="off" spellcheck="false" autofocus placeholder="type a command..." />
</div>

<div class="hint" id="hint">try: help</div>

<script>
// ---------- config ----------
const config = {
  redirectCommands: ['open desktop', 'cd desktop', 'cd /desktop', 'desktop'],
  desktopUrl: 'https://alexcoman.me/desktop',
  apiUrl: 'https://alexcoman-landing.vercel.app/api/ask',
  birthDate: '1990-08-19T09:30:00Z',
  email: 'hi@alexcoman.me',
  contactKeywords: ['contact', 'email', 'reach', 'mail', 'get in touch', 'hire', 'work with'],
  funfacts: [
    "LLMs don't actually think. they autocomplete at scale.",
    "AI's every response is a statistical guess."
  ]
};

// ---------- dom ----------
const input = document.getElementById('term-input');
const output = document.getElementById('output');
const hint = document.getElementById('hint');

// ---------- state ----------
const aiHistory = [];
const cmdHistory = [];
let cmdHistoryIdx = -1;
let uptimeInterval = null;

// ---------- helpers ----------
function addLine(text, cls) {
  const span = document.createElement('span');
  span.className = 'line ' + (cls || '');
  span.textContent = text;
  output.appendChild(span);
  output.scrollTop = output.scrollHeight;
  return span;
}

function addLines(lines) {
  lines.forEach(l => addLine(l.text, l.cls || ''));
  addLine('');
}

function copyToClipboard(text) {
  // modern API (HTTPS only)
  if (navigator.clipboard && window.isSecureContext) {
    return navigator.clipboard.writeText(text);
  }
  // fallback for file:// and http://
  return new Promise((resolve, reject) => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      ok ? resolve() : reject();
    } catch (e) {
      document.body.removeChild(ta);
      reject(e);
    }
  });
}

function addEmailBlock() {
  // email line — click to copy
  const emailLine = document.createElement('div');
  emailLine.className = 'line';
  emailLine.style.color = '#5DCAA5';
  emailLine.style.cursor = 'pointer';
  emailLine.style.userSelect = 'text';

  // split email + insert zero-width space to defeat auto-linkify (Cargo, etc)
  const [user, domain] = config.email.split('@');
  const prefix = document.createElement('span');
  prefix.textContent = '> ';
  const userSpan = document.createElement('span');
  userSpan.textContent = user + '\u200B'; // ZWSP after user
  const at = document.createElement('span');
  at.textContent = '@';
  const domainSpan = document.createElement('span');
  domainSpan.textContent = domain;
  const status = document.createElement('span');
  status.textContent = '  [click to copy]';
  status.style.color = 'rgba(255,255,255,0.4)';

  emailLine.append(prefix, userSpan, at, domainSpan, status);

  emailLine.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    copyToClipboard(config.email).then(() => {
      status.textContent = '  [copied]';
      setTimeout(() => { status.textContent = '  [click to copy]'; }, 1500);
    }).catch(() => {
      status.textContent = '  [select & copy manually]';
    });
  });

  output.appendChild(emailLine);

  // gmail shortcut
  const gmailLink = document.createElement('a');
  gmailLink.href = 'https://mail.google.com/mail/?view=cm&fs=1&to=' + encodeURIComponent(config.email);
  gmailLink.target = '_blank';
  gmailLink.rel = 'noopener noreferrer';
  gmailLink.textContent = '> open in gmail';
  gmailLink.className = 'line';
  gmailLink.style.color = 'rgba(255,255,255,0.4)';
  output.appendChild(gmailLink);

  output.scrollTop = output.scrollHeight;
}

function clearUptime() {
  if (uptimeInterval) { clearInterval(uptimeInterval); uptimeInterval = null; }
}

function getUptime() {
  const born = new Date(config.birthDate);
  const diff = new Date() - born;
  const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
  const days = Math.floor((diff % (1000 * 60 * 60 * 24 * 365.25)) / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const secs = Math.floor((diff % (1000 * 60)) / 1000);
  return `${years}y ${days}d ${hours}h ${mins}m ${secs}s`;
}

function fadeAndRedirect(url) {
  document.body.classList.add('fade-out');
  setTimeout(() => { window.top.location.href = url; }, 450);
}

function showThinkingDots() {
  const span = document.createElement('span');
  span.className = 'line dim';
  span.textContent = '>';
  output.appendChild(span);
  output.scrollTop = output.scrollHeight;
  let dots = 0;
  const interval = setInterval(() => {
    dots = (dots + 1) % 4;
    span.textContent = '>' + '.'.repeat(dots);
  }, 300);
  return { element: span, stop: () => clearInterval(interval) };
}

// ---------- commands ----------
const commands = {
  help: () => addLines([
    { text: 'available commands:', cls: 'help-header' },
    { text: '  sayhello', cls: 'help-cmd' },
    { text: '  funfact', cls: 'help-cmd' },
    { text: '  whoami', cls: 'help-cmd' },
    { text: '  uptime', cls: 'help-cmd' },
    { text: '  clear', cls: 'help-cmd' },
    { text: '  readme', cls: 'help-cmd' }
  ]),

  readme: () => addLines([
    { text: 'this is the surface.' },
    { text: 'the work lives somewhere else.' },
    { text: 'https://linkedin.com/in/alexcoman', cls: 'ok' }
  ]),

  clear: () => {
    output.innerHTML = '';
    addLine('');
  },

  cls: () => commands.clear(),

  whoami: () => {
    addLine('redirecting to /desktop...', 'dim');
    setTimeout(() => fadeAndRedirect(config.desktopUrl), 600);
  },

  uptime: () => {
    clearUptime();
    const span = document.createElement('span');
    span.className = 'line bright';
    span.textContent = getUptime();
    output.appendChild(span);
    addLine('load average: variable', 'dim');
    addLine('');
    uptimeInterval = setInterval(() => { span.textContent = getUptime(); }, 1000);
  },

  funfact: () => {
    const pick = config.funfacts[Math.floor(Math.random() * config.funfacts.length)];
    addLine(pick);
    addLine('');
  },

  sayhello: () => {
    addLine('> hello!', 'ai');
    askAI('hello');
  }
};

// ---------- contact intent (intercepts AI) ----------
function isContactIntent(query) {
  const q = query.toLowerCase();
  return config.contactKeywords.some(k => q.includes(k));
}

function handleContact() {
  addLine('> reach out:', 'ai');
  addEmailBlock();
  addLine('');
}

// ---------- ai fallback (logic untouched) ----------
async function askAI(query) {
  var thinking = showThinkingDots();
  aiHistory.push({ role: 'user', content: query });

  try {
    const response = await fetch(config.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: query, history: aiHistory.slice(-6) })
    });

    const data = await response.json();
    const text = data.text;

    thinking.stop();
    thinking.element.remove();

    if (text) {
      aiHistory.push({ role: 'assistant', content: text });
      if (aiHistory.length > 6) aiHistory.splice(0, 2);

      const lines = text.split('\n').filter(function(l) { return l.trim(); });
      const isOnlyUrl = lines.length === 1 && lines[0].trim().match(/^https?:\/\//);

      lines.forEach(function(l) {
        if (l.match(/^https?:\/\//)) {
          var url = l.trim();
          var a = document.createElement('a');
          a.href = url;
          a.textContent = '> ' + url;
          a.style.color = '#5DCAA5';
          a.style.display = 'block';
          a.className = 'line';
          output.appendChild(a);
          output.scrollTop = output.scrollHeight;
          if (isOnlyUrl) {
            setTimeout(function() { fadeAndRedirect(url); }, 1200);
          }
        } else if (l.match(/[\w.]+@[\w.]+\.\w+/)) {
          var email = l.match(/[\w.]+@[\w.]+\.\w+/)[0];
          var a = document.createElement('a');
          a.href = 'mailto:' + email;
          a.textContent = '> ' + l.trim();
          a.style.color = '#5DCAA5';
          a.style.display = 'block';
          a.className = 'line';
          a.target = '_top';
          output.appendChild(a);
          output.scrollTop = output.scrollHeight;
        } else {
          addLine('> ' + l, 'ai');
        }
      });
      addLine('');
    } else {
      addLine('> no response.', 'err');
      addLine('');
    }
  } catch (e) {
    thinking.stop();
    thinking.element.remove();
    addLine('> connection failed.', 'err');
    addLine('');
  }
}

// ---------- input handling ----------
input.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (cmdHistory.length === 0) return;
    if (cmdHistoryIdx === -1) cmdHistoryIdx = cmdHistory.length;
    cmdHistoryIdx = Math.max(0, cmdHistoryIdx - 1);
    input.value = cmdHistory[cmdHistoryIdx] || '';
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (cmdHistory.length === 0 || cmdHistoryIdx === -1) return;
    cmdHistoryIdx++;
    if (cmdHistoryIdx >= cmdHistory.length) {
      cmdHistoryIdx = -1;
      input.value = '';
    } else {
      input.value = cmdHistory[cmdHistoryIdx];
    }
    return;
  }

  if (e.key !== 'Enter') return;

  const val = input.value.trim();
  const valLower = val.toLowerCase();
  if (!val) return;

  cmdHistory.push(val);
  cmdHistoryIdx = -1;

  addLine('alex@coman ~ % ' + val, 'dim');
  input.value = '';
  hint.textContent = '';

  if (valLower !== 'uptime') clearUptime();

  if (config.redirectCommands.indexOf(valLower) !== -1) {
    addLine('unlocking /desktop...', 'dim');
    addLine('redirecting.', 'ok');
    setTimeout(() => fadeAndRedirect(config.desktopUrl), 800);
    return;
  }

  if (commands[valLower]) {
    commands[valLower]();
    return;
  }

  if (isContactIntent(val)) {
    handleContact();
    return;
  }

  askAI(val);
});

input.addEventListener('input', () => {
  const v = input.value.toLowerCase();
  if (v.indexOf('open') === 0 || v.indexOf('cd') === 0 || v === 'desktop') {
    hint.textContent = '→ this will take you somewhere';
  } else {
    hint.textContent = '';
  }
});
</script>
</body>
</html>
