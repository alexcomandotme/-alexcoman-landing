<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alexcoman.me</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'JetBrains Mono', monospace;
    padding: 2rem 4rem;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: opacity 0.8s ease;
  }

  body.fade-out {
    opacity: 0;
  }

  .term-header {
    font-size: 15px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .term-output {
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    line-height: 2;
    min-height: 80px;
    font-weight: 700;
    position: relative;
  }

  .term-output .line { display: block; }
  .term-output .dim { color: rgba(255,255,255,0.3); }
  .term-output .bright { color: #fff; }
  .term-output .ok { color: #1D9E75; }
  .term-output .err { color: #E24B4A; }
  .term-output .ai { color: #5DCAA5; }

  .scanline {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: rgba(255,255,255,0.03);
    animation: scanline 8s linear infinite;
    pointer-events: none;
    z-index: 999;
  }

  @keyframes scanline {
    0% { top: 0; }
    100% { top: 100vh; }
  }

  .term-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 1.5rem;
    border-top: 0.5px solid rgba(255,255,255,0.12);
    padding-top: 1.5rem;
  }

  .term-prompt {
    font-size: 15px;
    color: rgba(255,255,255,0.3);
    white-space: nowrap;
  }

  #term-input {
    background: transparent;
    border: none;
    outline: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #fff;
    flex: 1;
    caret-color: #fff;
  }

  #term-input::placeholder { color: rgba(255,255,255,0.2); }

  .hint {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    margin-top: 1rem;
    letter-spacing: 0.04em;
    min-height: 16px;
  }
</style>
</head>
<body>

<div class="scanline"></div>

<div class="term-header">alexcoman.me</div>

<div class="term-output" id="output">
  <span class="line dim">last login: today</span>
  <span class="line">&nbsp;</span>
  <span class="line">you're at the surface.</span>
  <span class="line dim">there's more underneath.</span>
  <span class="line">&nbsp;</span>
</div>

<div class="term-input-row">
  <span class="term-prompt">alex@coman ~ %</span>
  <input id="term-input" autocomplete="off" autocorrect="off" spellcheck="false" autofocus placeholder="type a command..." />
</div>

<div class="hint" id="hint">try: help</div>

<script>
const input = document.getElementById('term-input');
const output = document.getElementById('output');
const hint = document.getElementById('hint');
const history = [];

const responses = {
  help: [
    { text: 'available commands:', cls: 'dim' },
    { text: '  sayhello ', cls: '' },
    { text: '  funfact ', cls: '' },
    { text: '  whoami ', cls: '' },
    { text: '  uptime ', cls: '' },
  ],
  'cat readme.txt': [
    { text: 'this is the surface.', cls: '' },
    { text: 'the work lives somewhere else.', cls: '' },
    { text: 'https://linkedin.com/in/alexcoman', cls: 'ok' },
  ],
};

const funfactList = [
  'LLMs don\'t actually think. they autocomplete at scale.',
  'AI\'s every response is a statistical guess.',
];

const redirectCommands = ['open desktop', 'cd desktop', 'cd /desktop', 'desktop'];

function getUptime() {
  const born = new Date('1990-08-19T09:30:00Z');
  const now = new Date();
  const diff = now - born;
  const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
  const days = Math.floor((diff % (1000 * 60 * 60 * 24 * 365.25)) / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const secs = Math.floor((diff % (1000 * 60)) / 1000);
  return years + 'y ' + days + 'd ' + hours + 'h ' + mins + 'm ' + secs + 's';
}

function addLine(text, cls) {
  const span = document.createElement('span');
  span.className = 'line ' + (cls || '');
  span.textContent = text;
  output.appendChild(span);
  output.scrollTop = output.scrollHeight;
  return span;
}

function addLines(lines) {
  lines.forEach(function(l) { addLine(l.text, l.cls || ''); });
  addLine('');
}

function showThinkingDots() {
  var span = document.createElement('span');
  span.className = 'line dim';
  span.textContent = '>';
  output.appendChild(span);
  output.scrollTop = output.scrollHeight;
  var dots = 0;
  var interval = setInterval(function() {
    dots = (dots + 1) % 4;
    span.textContent = '>' + '.'.repeat(dots);
  }, 300);
  return { element: span, stop: function() { clearInterval(interval); } };
}

function fadeAndRedirect(url) {
  document.body.classList.add('fade-out');
  setTimeout(function() {
    window.top.location.href = url;
  }, 900);
}

async function askAI(query) {
  var thinking = showThinkingDots();
  history.push({ role: 'user', content: query });

  try {
    const response = await fetch('https://alexcoman-landing.vercel.app/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: query, history: history.slice(-6) })
    });

    const data = await response.json();
    const text = data.text;

    thinking.stop();
    thinking.element.remove();

    if (text) {
      history.push({ role: 'assistant', content: text });
      if (history.length > 6) history.splice(0, 2);

      text.split('\n').filter(function(l) { return l.trim(); }).forEach(function(l) {
       if (l.match(/^https?:\/\//)) {
          var a = document.createElement('a');
          a.href = l.trim();
          a.textContent = '> ' + l.trim();
          a.style.color = '#5DCAA5';
          a.style.display = 'block';
          a.className = 'line';
          output.appendChild(a);
          output.scrollTop = output.scrollHeight;
          setTimeout(function() {
            fadeAndRedirect(l.trim());
          }, 1200);
        } else if (l.match(/[\w.]+@[\w.]+\.\w+/)) {
          var email = l.match(/[\w.]+@[\w.]+\.\w+/)[0];
          var a = document.createElement('a');
          a.href = 'mailto:' + email;
          a.textContent = '> ' + l.trim();
          a.style.color = '#5DCAA5';
          a.style.display = 'block';
          a.className = 'line';
          a.target = '_top';
          output.appendChild(a);
          output.scrollTop = output.scrollHeight;
        } else {
          addLine('> ' + l, 'ai');
        }
      });
      addLine('');
    } else {
      addLine('> no response.', 'err');
      addLine('');
    }
  } catch (e) {
    thinking.stop();
    thinking.element.remove();
    addLine('> connection failed.', 'err');
    addLine('');
  }
}

input.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const val = input.value.trim();
  const valLower = val.toLowerCase();
  if (!val) return;

  addLine('alex@coman ~ % ' + val, 'dim');
  input.value = '';
  hint.textContent = '';

  if (redirectCommands.indexOf(valLower) !== -1) {
    addLine('unlocking /desktop...', 'dim');
    addLine('redirecting.', 'ok');
    setTimeout(function() {
      fadeAndRedirect('https://alexcoman.me/desktop');
    }, 800);
    return;
  }

  if (valLower === 'whoami') {
    addLine('redirecting to /desktop...', 'dim');
    setTimeout(function() {
      fadeAndRedirect('https://alexcoman.me/desktop');
    }, 600);
    return;
  }

  if (valLower === 'uptime') {
    const span = document.createElement('span');
    span.className = 'line bright';
    span.textContent = getUptime();
    output.appendChild(span);
    addLine('load average: variable', 'dim');
    addLine('');
    const interval = setInterval(function() {
      span.textContent = getUptime();
    }, 1000);
    setTimeout(function() { clearInterval(interval); }, 60000);
    return;
  }

  if (valLower === 'funfact') {
    const shuffled = funfactList.slice().sort(function() { return 0.5 - Math.random(); });
    addLine(shuffled[0], '');
    addLine('');
    return;
  }

  const resp = responses[valLower];
  if (resp) {
    addLines(resp);
  } else {
    askAI(val);
  }
});

input.addEventListener('input', function() {
  const v = input.value.toLowerCase();
  if (v.indexOf('open') === 0 || v.indexOf('cd') === 0 || v === 'desktop') {
    hint.textContent = '→ this will take you somewhere';
  } else {
    hint.textContent = '';
  }
});
</script>
</body>
</html>
